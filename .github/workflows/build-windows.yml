name: Build Windows

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Windows packages
        run: pnpm --filter @workspace/upanapu-selain run dist:win

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Upan-Apu-Selain-Windows
          path: artifacts/upanapu-selain/dist/packages/*.exe
          retention-days: 30
          if-no-files-found: error
